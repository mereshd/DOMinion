<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; padding: 16px; font-family: system-ui, sans-serif; font-size: 14px; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; }
    input { width: 100%; padding: 6px 8px; margin-bottom: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 8px; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #3367d6; }
    button:disabled { background: #ccc; cursor: default; }
    #status { margin-top: 8px; font-size: 12px; color: #666; }
    #status.error { color: #d93025; }
    #status.success { color: #188038; }
  </style>
</head>
<body>
  <h1>📝 ArticleNotes</h1>
  <label for="apiKey">Gemini API Key</label>
  <input type="password" id="apiKey" placeholder="Enter your Gemini API key">
  <button id="analyze">Analyze Page</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
