<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArticleNotes</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>ArticleNotes</h1>
      <p class="tagline">AI-powered article analysis</p>
    </header>

    <main class="popup-main">
      <div class="api-key-section">
        <label for="api-key">Gemini API Key</label>
        <div class="input-group">
          <input 
            type="password" 
            id="api-key" 
            placeholder="Enter your API key"
            autocomplete="off"
          >
          <button id="toggle-visibility" type="button" aria-label="Toggle visibility">
            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon-eye-off hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div id="status" class="status"></div>
      </div>

      <button id="save-key" class="btn btn-secondary">
        Save API Key
      </button>

      <hr class="divider">

      <button id="analyze-btn" class="btn btn-primary" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        Annotate This Page
      </button>

      <button id="clear-btn" class="btn btn-danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clear Annotations
      </button>

      <p class="help-text">
        <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">
          Get your free API key
        </a>
      </p>
    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
